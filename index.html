<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MST DEV — Скоро</title>
  <meta name="description" content="mst-dev.com — coming soon" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange: #FF5210;
      --orange-dim: rgba(255, 82, 16, 0.18);
      --orange-glow: rgba(255, 82, 16, 0.35);
      --bg: #080808;
      --surface: #101010;
      --text: #F0EDE8;
      --muted: rgba(240, 237, 232, 0.35);
      --line: rgba(240, 237, 232, 0.06);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── CANVAS GRID ── */
    canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* ── GHOST WATERMARK ── */
    .ghost {
      position: fixed;
      bottom: -4vw;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(120px, 28vw, 380px);
      letter-spacing: -0.04em;
      line-height: 1;
      color: transparent;
      -webkit-text-stroke: 1px rgba(255, 82, 16, 0.07);
      white-space: nowrap;
      pointer-events: none;
      z-index: 1;
      user-select: none;
      animation: ghostPulse 8s ease-in-out infinite;
    }

    @keyframes ghostPulse {
      0%, 100% { opacity: 0.7; }
      50% { opacity: 1; }
    }

    /* ── MAIN LAYOUT ── */
    .stage {
      position: relative;
      z-index: 10;
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ── TOP DOMAIN TAG ── */
    .domain-tag {
      position: fixed;
      top: 32px;
      right: 36px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: lowercase;
      z-index: 20;
      opacity: 0;
      animation: fadeUp 1s ease 0.2s forwards;
    }

    .domain-tag span {
      color: var(--orange);
      opacity: 0.7;
    }

    /* ── STATUS DOT ── */
    .status {
      position: fixed;
      top: 34px;
      left: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.14em;
      color: var(--muted);
      text-transform: uppercase;
      z-index: 20;
      opacity: 0;
      animation: fadeUp 1s ease 0.3s forwards;
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--orange);
      box-shadow: 0 0 8px var(--orange);
      animation: blink 2.4s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--orange); }
      50% { opacity: 0.4; box-shadow: 0 0 3px var(--orange); }
    }

    /* ── LOGO ── */
    .logo-wrap {
      position: relative;
      width: clamp(100px, 14vw, 160px);
      height: clamp(100px, 14vw, 160px);
      margin-bottom: 48px;
      opacity: 0;
      animation: logoReveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
    }

    .logo-glow {
      position: absolute;
      inset: -40%;
      border-radius: 50%;
      background: radial-gradient(circle, var(--orange-glow) 0%, transparent 70%);
      animation: glowPulse 4s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    .logo-img {
      position: relative;
      width: 100%; height: 100%;
      object-fit: contain;
      border-radius: 50%;
      display: block;
      filter: drop-shadow(0 0 24px rgba(255, 82, 16, 0.4));
      z-index: 2;
    }

    @keyframes logoReveal {
      from { opacity: 0; transform: scale(0.82) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* ── EYEBROW ── */
    .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: clamp(9px, 1.2vw, 11px);
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--orange);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp 0.9s ease 0.9s forwards;
    }

    /* ── HEADLINE ── */
    .headline {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: clamp(52px, 9vw, 120px);
      letter-spacing: -0.03em;
      line-height: 0.92;
      text-align: center;
      color: var(--text);
      position: relative;
      margin-bottom: 28px;
      opacity: 0;
      animation: headlineReveal 1s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
    }

    .headline em {
      font-style: normal;
      color: var(--orange);
      position: relative;
      display: inline-block;
    }

    .headline em::after {
      content: '';
      position: absolute;
      bottom: 0.06em;
      left: 0; right: 0;
      height: 2px;
      background: var(--orange);
      transform-origin: left;
      transform: scaleX(0);
      animation: lineGrow 0.7s ease 2.1s forwards;
    }

    @keyframes lineGrow {
      to { transform: scaleX(1); }
    }

    @keyframes headlineReveal {
      from { opacity: 0; transform: translateY(30px) skewY(1deg); }
      to   { opacity: 1; transform: translateY(0) skewY(0); }
    }

    /* ── SUBTEXT ── */
    .sub {
      font-family: 'DM Mono', monospace;
      font-size: clamp(12px, 1.4vw, 14px);
      font-weight: 300;
      letter-spacing: 0.04em;
      color: var(--muted);
      text-align: center;
      max-width: 400px;
      line-height: 1.7;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.5s forwards;
    }

    /* ── DIVIDER ── */
    .divider {
      width: 40px;
      height: 1px;
      background: var(--orange);
      margin: 32px auto;
      opacity: 0;
      animation: fadeUp 0.8s ease 1.7s forwards;
    }

    /* ── BOTTOM COUNTER / META ── */
    .meta-row {
      display: flex;
      align-items: center;
      gap: 28px;
      opacity: 0;
      animation: fadeUp 0.9s ease 1.9s forwards;
    }

    .meta-item {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .meta-sep {
      width: 3px; height: 3px;
      border-radius: 50%;
      background: rgba(255, 82, 16, 0.4);
    }

    /* ── BOTTOM LINE ── */
    .bottom-line {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--orange), transparent);
      opacity: 0.5;
      z-index: 20;
    }

    /* ── SHARED FADE UP ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .domain-tag, .status { top: 20px; }
      .domain-tag { right: 20px; }
      .status { left: 20px; }
      .ghost { font-size: 38vw; }
    }
  </style>
</head>
<body>

  <canvas id="grid"></canvas>

  <div class="ghost">SOON</div>

  <div class="status">
    <div class="dot"></div>
    <span>in development</span>
  </div>

  <div class="domain-tag"><span>//</span> mst-dev.com</div>

  <main class="stage">
    <div class="logo-wrap">
      <div class="logo-glow"></div>
      <img class="logo-img" src="logo.jpg" alt="MST Logo" />
    </div>

    <div class="eyebrow">MST Development</div>

    <h1 class="headline">
      Coming<br /><em>Soon</em>
    </h1>

    <p class="sub">
      The site is under development.<br />
      Something great is on the way.
    </p>

    <div class="divider"></div>

    <div class="meta-row">
      <span class="meta-item">2026</span>
      <div class="meta-sep"></div>
      <span class="meta-item">mst-dev.com</span>
      <div class="meta-sep"></div>
      <span class="meta-item">coming soon</span>
    </div>
  </main>

  <div class="bottom-line"></div>

  <script>
    // Animated grid canvas
    const canvas = document.getElementById('grid');
    const ctx = canvas.getContext('2d');

    let W, H, cols, rows;
    const CELL = 60;
    let t = 0;
    const nodes = [];

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
      cols = Math.ceil(W / CELL) + 1;
      rows = Math.ceil(H / CELL) + 1;
    }

    function easeInOut(x) {
      return x < 0.5 ? 2 * x * x : 1 - Math.pow(-2 * x + 2, 2) / 2;
    }

    // Floating orbs
    const orbs = Array.from({ length: 3 }, (_, i) => ({
      x: Math.random() * 0.8 + 0.1,
      y: Math.random() * 0.8 + 0.1,
      r: 180 + Math.random() * 120,
      speed: 0.0003 + Math.random() * 0.0002,
      phase: Math.random() * Math.PI * 2,
    }));

    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 0.008;

      // Draw subtle grid lines
      ctx.strokeStyle = 'rgba(240, 237, 232, 0.04)';
      ctx.lineWidth = 0.5;

      for (let c = 0; c <= cols; c++) {
        const x = c * CELL;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }
      for (let r = 0; r <= rows; r++) {
        const y = r * CELL;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }

      // Draw grid intersection dots
      for (let c = 0; c <= cols; c++) {
        for (let r = 0; r <= rows; r++) {
          const x = c * CELL;
          const y = r * CELL;
          const wave = Math.sin(t + c * 0.4 + r * 0.3) * 0.5 + 0.5;
          const a = wave * 0.15;
          ctx.fillStyle = `rgba(255, 82, 16, ${a})`;
          ctx.beginPath();
          ctx.arc(x, y, 1, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Draw orange ambient orbs
      orbs.forEach((orb, i) => {
        const ox = orb.x * W + Math.sin(t * orb.speed * 400 + orb.phase) * 80;
        const oy = orb.y * H + Math.cos(t * orb.speed * 350 + orb.phase + 1) * 60;

        const grad = ctx.createRadialGradient(ox, oy, 0, ox, oy, orb.r);
        grad.addColorStop(0, `rgba(255, 82, 16, ${0.04 + i * 0.01})`);
        grad.addColorStop(1, 'rgba(255, 82, 16, 0)');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(ox, oy, orb.r, 0, Math.PI * 2);
        ctx.fill();
      });

      requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize', resize);
    draw();
  </script>
</body>
</html>
